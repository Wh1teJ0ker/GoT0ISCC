name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.os-name }} release artifact
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os-name: macOS
            artifact-name: GoT0ISCC-macos
            archive-name: GoT0ISCC-macos.zip
          - os: windows-latest
            os-name: Windows
            artifact-name: GoT0ISCC-windows
            archive-name: GoT0ISCC-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Wails bindings
        shell: bash
        run: |
          mkdir -p frontend/dist
          if [ ! -f frontend/dist/index.html ]; then
            printf '%s\n' '<!doctype html><html><head><meta charset="UTF-8"><title>GoT0ISCC</title></head><body><div id="root"></div></body></html>' > frontend/dist/index.html
          fi
          wails generate module

      - name: Run tests
        run: go test ./...

      - name: Build Wails app (macOS)
        if: runner.os == 'macOS'
        run: wails build -clean -platform darwin/universal -o GoT0ISCC

      - name: Build Wails app (Windows)
        if: runner.os == 'Windows'
        run: wails build -clean -platform windows/amd64 -webview2 embed -o GoT0ISCC

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent build/bin/GoT0ISCC.app artifacts/${{ matrix.archive-name }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path build/bin/GoT0ISCC.exe -DestinationPath artifacts/${{ matrix.archive-name }} -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts/${{ matrix.archive-name }}

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ matrix.archive-name }}
          generate_release_notes: true
          draft: false
          prerelease: false
