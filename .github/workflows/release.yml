name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    name: Build ${{ matrix.os-name }} release artifact
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os-name: macOS
            artifact-name: GoT0ISCC-macos
            archive-name: GoT0ISCC-macos.zip
          - os: windows-2025
            os-name: Windows
            artifact-name: GoT0ISCC-windows
            archive-name: GoT0ISCC-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        run: go test ./...

      - name: Build Wails app (macOS)
        if: runner.os == 'macOS'
        run: wails build -clean -platform darwin/universal -o GoT0ISCC

      - name: Build Wails app (Windows)
        if: runner.os == 'Windows'
        run: wails build -clean -platform windows/amd64 -webview2 embed -o GoT0ISCC

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent build/bin/GoT0ISCC.app artifacts/${{ matrix.archive-name }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $candidates = @(
            "build/bin/GoT0ISCC.exe",
            "build/bin/GoT0ISCC"
          )
          $source = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $source) {
            throw "Windows build artifact not found. Checked: $($candidates -join ', ')"
          }
          $stagingDir = Join-Path $PWD "artifacts/windows-package"
          New-Item -ItemType Directory -Force $stagingDir | Out-Null
          $targetName = Split-Path $source -Leaf
          Copy-Item -Path $source -Destination (Join-Path $stagingDir $targetName) -Force
          Compress-Archive -Path (Join-Path $stagingDir '*') -DestinationPath artifacts/${{ matrix.archive-name }} -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts/${{ matrix.archive-name }}

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: artifacts/${{ matrix.archive-name }}
          generate_release_notes: true
          draft: false
          prerelease: false
