name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Wails bindings
        shell: bash
        run: |
          mkdir -p frontend/dist
          if [ ! -f frontend/dist/index.html ]; then
            printf '%s\n' '<!doctype html><html><head><meta charset="UTF-8"><title>GoT0ISCC</title></head><body><div id="root"></div></body></html>' > frontend/dist/index.html
          fi
          wails generate module

      - name: Build frontend
        working-directory: frontend
        run: npm run ci

      - name: Run Go tests
        run: go test ./...

  build-desktop:
    name: Build ${{ matrix.os-name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os-name: macOS
            artifact-name: GoT0ISCC-macos
          - os: windows-latest
            os-name: Windows
            artifact-name: GoT0ISCC-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails app (macOS)
        if: runner.os == 'macOS'
        run: wails build -clean -platform darwin/universal -o GoT0ISCC

      - name: Build Wails app (Windows)
        if: runner.os == 'Windows'
        run: wails build -clean -platform windows/amd64 -webview2 embed -o GoT0ISCC

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent build/bin/GoT0ISCC.app artifacts/GoT0ISCC-macos.zip

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path build/bin/GoT0ISCC.exe -DestinationPath artifacts/GoT0ISCC-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts/*
